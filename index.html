<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maheendra Menon — Designer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

  <div class="custom-cursor" id="cursor"></div>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand" id="brandReset" style="cursor: pointer;">
        <div class="brand-left"><div class="avatar-small">MM</div><div class="brand-text"><h1>Maheendra Menon</h1></div></div>
      </div>
      <nav class="nav">
        <a href="#about">About</a><a href="#projects">Projects</a><a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="hero" class="hero">
      <div class="container hero-panel">
        <div class="hero-card">
          <h1>Maheendra Menon</h1>
          <p>Designer & Developer creating animated, polished websites.</p>
          <a class="btn" href="#about" id="revealBtn">Explore Profile</a>
        </div>
      </div>
    </section>

    <div class="main-content" id="mainContent">
      <section id="about" class="container"><h3>About</h3><p>Content...</p></section>
      <section id="projects" class="container"><h3>Projects</h3><div class="project-grid">...</div></section>
      <section id="contact" class="container"><h3>Contact</h3><p>Email me.</p></section>
    </div>
  </main>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // 1. Custom Cursor
    const cursor = document.getElementById('cursor');
    window.addEventListener('mousemove', (e) => {
      gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
    });
    document.querySelectorAll('a, .btn, .brand').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('cursor-grow'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-grow'));
    });

    // 2. Reveal Logic + GSAP Initialization
    const revealBtn = document.getElementById('revealBtn');
    revealBtn.addEventListener('click', (e) => {
      e.preventDefault();
      document.body.classList.add('show-content');
      
      // Initialize GSAP after the curtain lifts
      setTimeout(() => {
        // Parallax
        gsap.to(".hero-panel", { yPercent: 50, ease: "none", scrollTrigger: { trigger: ".hero", scrub: true } });
        
        // Scroll Reveals
        gsap.utils.toArray(".main-content > section").forEach((section) => {
          gsap.to(section, {
            opacity: 1, y: 0, duration: 1, ease: "power3.out",
            scrollTrigger: { trigger: section, start: "top 80%" }
          });
        });
      }, 500);
      
      setTimeout(() => document.querySelector('#about').scrollIntoView({ behavior: 'smooth' }), 400);
    });
  </script>
</body>
</html>
