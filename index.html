<!doctype html>
<html lang="en">
<body>
  <section id="hero" class="hero">
    <div class="hero-panel">
      <h1>Maheendra Menon</h1>
      <a href="#" id="startBtn" class="btn">Explore Profile</a>
      <div class="scroll-hint">↓</div>
    </div>
  </section>

  <main class="main-content" id="mainContent">
    <section id="about">
      <h3>About</h3>
      <p>Content goes here...</p>
    </section>
    <section id="projects">
      <h3>Projects</h3>
      </section>
    <section id="skills">
      <h3>Skills</h3>
      <ul class="skill-list">
        <li>HTML</li><li>CSS</li><li>JavaScript</li>
      </ul>
    </section>
    <section id="contact">
      <h3>Hit me up!</h3>
      <div class="contact-grid">
        <a href="#" class="contact-link">Instagram</a>
        <a href="#" class="contact-link">Gmail</a>
      </div>
    </section>
  </main>

  <script>
    const hero = document.getElementById('hero');
    const startBtn = document.getElementById('startBtn');

    // Fade out Hero
    const showPortfolio = () => {
      hero.style.opacity = '0';
      setTimeout(() => hero.style.display = 'none', 1000);
    };

    startBtn.addEventListener('click', (e) => {
      e.preventDefault();
      showPortfolio();
    });

    // Observer for section fade-in
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('is-visible');
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('.main-content > section').forEach(s => observer.observe(s));
  </script>
</body>
</html>
