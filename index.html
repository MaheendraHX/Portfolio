<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section id="hero" class="hero">
    <div class="hero-panel">
      <h1>Maheendra Menon</h1>
      <a href="#" id="startBtn" class="btn">Explore Profile</a>
      <div class="scroll-hint">↓</div>
    </div>
  </section>

  <main class="main-content" id="mainContent">
    <section id="about">
      <div class="content-card">
        <h3>About</h3>
        <p>Designer & Web Developer based in Ernakulam.</p>
      </div>
    </section>
    <section id="projects">
      <div class="content-card">
        <h3>Projects</h3>
        <p>Interactive web experiences.</p>
      </div>
    </section>
    <section id="skills">
      <div class="content-card">
        <h3>Skills</h3>
        <p>HTML, CSS, JavaScript, Web Design.</p>
      </div>
    </section>
  </main>

  <script>
    const hero = document.getElementById('hero');
    const startBtn = document.getElementById('startBtn');
    const main = document.getElementById('mainContent');

    startBtn.addEventListener('click', (e) => {
      e.preventDefault();
      hero.style.opacity = '0';
      hero.style.pointerEvents = 'none';
      document.body.style.overflowY = 'auto';
      setTimeout(() => hero.style.display = 'none', 1000);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('is-visible');
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('.main-content > section').forEach(s => observer.observe(s));
  </script>
</body>
</html>
